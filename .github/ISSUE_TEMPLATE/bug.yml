name: Bug report
description: Something is broken or behaving incorrectly
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Git tag, commit SHA, or "latest main"
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what actually happened? Include steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, relevant tooling versions
